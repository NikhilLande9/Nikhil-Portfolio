name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Add these three lines to grant the action permission to push code
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build -- --mode gh-pages 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist